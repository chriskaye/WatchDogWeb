
services:
  api:
    build: ./api
    volumes:
      - ./api:/app
    working_dir: /app
    command: >
      bash -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 80"
    ports:
      - "8000:80"
    depends_on:
      - db

  sensor_simulator:
    image: python:3.11-slim
    volumes:
      - ./simulator:/app
    working_dir: /app
    command: >
      bash -c "pip install -r requirements.txt &&
              python sim.py"
    depends_on:
      - api

  db:
    image: timescale/timescaledb-ha:pg14-latest
    environment:
      POSTGRES_PASSWORD: example
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/home/postgres/pgdata/data

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
    - ./grafana_data:/var/lib/grafana

volumes:
  postgres_data: